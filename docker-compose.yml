services:
  cargoclue:
    build: .
    image: cargoclue
    container_name: cargoclue
    restart: unless-stopped
    ports:
      # HOST:CONTAINER — left is the port on your machine, right is the port
      # the app listens on inside the container (must match PORT below).
      - "9999:9999"
    volumes:
      # Mount the host Docker socket (read-only) so CargoClue can see all
      # containers and stacks on this machine.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - PORT=9999
      # Override if your host uses a non-default socket path.
      # - DOCKER_SOCKET=/var/run/docker.sock
