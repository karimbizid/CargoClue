<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CargoClue · Docker logs</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="logo.png" alt="CargoClue" class="logo-img" />
    </div>
    <div class="stack-picker">
      <label for="stackSelect">Stack</label>
      <select id="stackSelect">
        <option value="all">All stacks</option>
      </select>
      <button id="refreshBtn" title="Refresh containers">↻</button>
    </div>
    <div class="status-group">
      <span class="version" id="version"></span>
      <a id="githubLink" class="gh-link" href="https://github.com/karimbizid/CargoClue"
         target="_blank" rel="noopener noreferrer" title="View on GitHub">
        <svg viewBox="0 0 16 16" width="18" height="18" aria-hidden="true" fill="currentColor">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        <span class="gh-badge" id="ghBadge" hidden></span>
      </a>
      <span class="conn" id="connStatus">disconnected</span>
      <button id="themeToggle" class="theme-toggle" title="Toggle light / dark">☀️</button>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <div class="sidebar-head">
        <span>Containers</span>
        <span class="collapse-all">
          <button id="expandAll" title="Expand all stacks">+</button>
          <button id="collapseAll" title="Collapse all stacks">−</button>
        </span>
      </div>
      <div id="containerList" class="container-list"></div>
    </aside>

    <section class="logpane">
      <div class="logpane-head">
        <span id="currentContainer">Select a container</span>
        <div class="log-controls">
          <div class="export-group" title="Copy or download the last N minutes of logs">
            <input type="number" id="exportMinutes" min="1" max="1440" value="15" />
            <span class="export-unit">min</span>
            <button id="copyRange" class="export-btn" title="Copy last N minutes to clipboard">⧉</button>
            <button id="downloadRange" class="export-btn" title="Download last N minutes">⬇</button>
          </div>
          <div class="level-chips" id="levelChips">
            <button class="chip" data-level="error">Error</button>
            <button class="chip" data-level="warn">Warning</button>
            <button class="chip" data-level="info">Info</button>
            <button class="chip" data-level="debug">Debug</button>
          </div>
          <input type="text" id="filterInput" placeholder="Filter…" />
          <label class="chk"><input type="checkbox" id="autoscroll" checked /> Autoscroll</label>
          <button id="clearBtn" title="Clear log view">Clear</button>
        </div>
      </div>
      <div id="logWindow" class="log-window"></div>
    </section>
  </main>

  <footer class="pinned">
    <div class="pinned-head">
      <span>Pinned log entries (<span id="pinCount">0</span>)</span>
      <button id="clearPinsBtn">Clear all</button>
    </div>
    <div id="pinnedList" class="pinned-list"></div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
